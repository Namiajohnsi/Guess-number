<!DOCTYPE html>
<html>
<head>
    <title>Guess the Number</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #f0f0f0;
        }
        .box {
            margin-top: 100px;
            padding: 20px;
            background: white;
            display: inline-block;
            border-radius: 10px;
        }
        input, button {
            padding: 10px;
            margin: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Guess Number (1-10)</h2>
    <input type="number" id="guess">
    <button onclick="check()">Check</button>
    <p id="result"></p>
</div>

<script>
    let num = Math.floor(Math.random() * 10) + 1;

    function check() {
        let guess = document.getElementById("guess").value;

        if (guess == num) {
            document.getElementById("result").innerText = "Correct!";
        } else {
            document.getElementById("result").innerText = "Wrong! Number was " + num;
        }
    }
</script>

</body>
</html>
